name: Collect Repository Owner Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect-data:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Collect repository data
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node scripts/collect-data.js

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Repository Overview</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
        }
        .chart-container {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1>Organization Repository Overview</h1>
    <div id="orgCards"></div>
    <div class="chart-container">
        <canvas id="repoChart"></canvas>
    </div>

    <script>
        const orgData = [
            { name: 'Org 1', totalRepos: 5, activeRepos: 3 },
            { name: 'Org 2', totalRepos: 8, activeRepos: 6 },
            // Add more organizations as necessary
        ];

        // Generate cards
        const orgCardsDiv = document.getElementById('orgCards');
        orgData.forEach(org => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h2>${org.name}</h2>\n                              <p>Total Repositories: ${org.totalRepos}</p>\n                              <p>Active Repositories: ${org.activeRepos}</p>`;
            orgCardsDiv.appendChild(card);
        });

        // Line chart data
        const ctx = document.getElementById('repoChart').getContext('2d');
        const repoChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['2026-01', '2026-02', '2026-03', '2026-04', '2026-05'], // Add more labels as needed
                datasets: [{
                    label: 'Total Repositories',
                    data: [15, 20, 30, 25, 35], // Add dynamic data for total repos per organization over time
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 2,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>

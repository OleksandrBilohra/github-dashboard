<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Owner Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 30px; color: #58a6ff; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: #58a6ff;
            box-shadow: 0 0 10px rgba(88, 166, 255, 0.2);
        }
        .card h3 { color: #58a6ff; margin-bottom: 10px; }
        .stat { font-size: 24px; font-weight: bold; color: #3fb950; }
        .sub-stat { 
            font-size: 12px; 
            color: #8b949e; 
            margin-top: 5px;
        }
        .chart-container { 
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            height: 400px;
        }

        /* Modal für Repos-Details */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 30px;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            width: 90%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
        }
        .modal-header h2 {
            color: #58a6ff;
        }
        .close-btn {
            color: #8b949e;
            font-size: 28px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .close-btn:hover {
            color: #58a6ff;
        }

        .repos-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .repo-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .repo-item:hover {
            border-color: #f85149;
            background: #1a1f26;
        }
        .repo-name {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }
        .repo-name:hover {
            text-decoration: underline;
        }
        .repo-value {
            background: #f85149;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stats-modal {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 15px;
            text-align: center;
        }
        .stat-box .number {
            font-size: 28px;
            font-weight: bold;
            color: #3fb950;
        }
        .stat-box .label {
            font-size: 12px;
            color: #8b949e;
            margin-top: 5px;
        }
        .stat-box.inactive .number {
            color: #f85149;
        }

        .search-box {
            margin-bottom: 15px;
        }
        .search-box input {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
        }
        .search-box input::placeholder {
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Repository Owner Tracker</h1>
        
        <div class="grid" id="stats"></div>
        
        <div class="chart-container">
            <canvas id="trendsChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="percentChart"></canvas>
        </div>
    </div>

    <!-- Modal für inaktive Repos -->
    <div class="modal" id="reposModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Inaktive Repositories</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <div class="stats-modal" id="statsModal"></div>

            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Nach Repository suchen..."
                    onkeyup="filterRepos()"
                >
            </div>

            <div class="repos-list" id="reposList"></div>
        </div>
    </div>

    <script>
        let allInactiveRepos = [];
        let filteredRepos = [];
        let currentOrg = null;

        async function loadData() {
            try {
                const response = await fetch('./data/dashboard-data.json');
                const data = await response.json();

                console.log('Dashboard data loaded:', data);

                const colors = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#a371f7', '#79c0ff', '#56d364'];
                
                // Lade detaillierte Repo-Daten
                await loadInactiveRepos();
                
                // Stats (oben) - mit Click-Handler
                const statsHtml = data.organizations
                    .map(org => {
                        const pct = org.totalRepos > 0 ? Math.round(((org.activeRepos || 0) / org.totalRepos) * 100) : 0;
                        return `
                        <div class="card" onclick="showInactiveRepos('${org.name}')">
                            <h3>${org.name}</h3>
                            <div class="stat">${org.totalRepos}</div>
                            <p>Repositories</p>
                            <div class="sub-stat">✅ Aktiv: ${org.activeRepos || 0} (${pct}%)</div>
                            <div class="sub-stat">❌ Nicht Aktiv: ${org.inactiveRepos || 0}</div>
                        </div>`;
                    })
                    .join('');
                document.getElementById('stats').innerHTML = statsHtml;
                
                // Trends Chart
                const dates = data.trends.map(t => t.date);
                const orgs = data.organizations.map(o => o.name);
                
                const totalDatasets = orgs.map((org, i) => ({
                    label: org,
                    data: data.trends.map(t => t[org] || 0),
                    borderColor: colors[i % colors.length],
                    backgroundColor: colors[i % colors.length] + '20',
                    tension: 0.3,
                    fill: false
                }));
                
                new Chart(document.getElementById('trendsChart'), {
                    type: 'line',
                    data: { labels: dates, datasets: totalDatasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#c9d1d9' } },
                            title: {
                                display: true,
                                text: 'Repositories pro Org (Trend)',
                                color: '#c9d1d9'
                            }
                        },
                        scales: {
                            y: { ticks: { color: '#c9d1d9' }, grid: { color: '#30363d' } },
                            x: { ticks: { color: '#c9d1d9' }, grid: { color: '#30363d' } }
                        }
                    }
                });

                // Prozent Chart
                const percentDatasets = orgs.map((org, i) => {
                    const orgNow = data.organizations.find(o => o.name === org);
                    const pct = orgNow && orgNow.totalRepos > 0
                        ? ((orgNow.activeRepos || 0) / orgNow.totalRepos) * 100
                        : 0;

                    return {
                        label: org,
                        data: dates.map(() => Number(pct.toFixed(2))),
                        borderColor: colors[i % colors.length],
                        backgroundColor: colors[i % colors.length] + '20',
                        tension: 0.3,
                        fill: false
                    };
                });

                new Chart(document.getElementById('percentChart'), {
                    type: 'line',
                    data: { labels: dates, datasets: percentDatasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { labels: { color: '#c9d1d9' } },
                            title: {
                                display: true,
                                text: 'Aktive Repos in % (aktueller Stand)',
                                color: '#c9d1d9'
                            },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}%`
                                }
                            }
                        },
                        scales: {
                            y: {
                                min: 0,
                                max: 100,
                                ticks: {
                                    color: '#c9d1d9',
                                    callback: (v) => v + '%'
                                },
                                grid: { color: '#30363d' }
                            },
                            x: { ticks: { color: '#c9d1d9' }, grid: { color: '#30363d' } }
                        }
                    }
                });

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        async function loadInactiveRepos() {
            try {
                const response = await fetch('./data/repos-detail.json');
                const data = await response.json();
                console.log('Inactive repos data loaded:', data);
                
                allInactiveRepos = data.repos || [];
                console.log('Total inactive repos loaded:', allInactiveRepos.length);
            } catch (error) {
                console.error('Error loading inactive repos:', error);
                allInactiveRepos = [];
            }
        }

        function showInactiveRepos(org) {
            currentOrg = org;
            
            // Filtere nur inaktive Repos für diese Org
            const orgInactiveRepos = allInactiveRepos.filter(r => r.org === org);
            filteredRepos = orgInactiveRepos;

            console.log(`Showing ${orgInactiveRepos.length} inactive repos for ${org}`);

            // Hole die Total-Werte vom API
            fetch('./data/dashboard-data.json')
                .then(r => r.json())
                .then(data => {
                    const orgData = data.organizations.find(o => o.name === org);
                    const totalRepos = orgData?.totalRepos || 0;
                    const activeRepos = orgData?.activeRepos || 0;
                    const inactiveRepos = orgData?.inactiveRepos || 0;

                    document.getElementById('modalTitle').textContent = `${org} - Inaktive Repositories`;

                    const statsHtml = `
                        <div class="stat-box">
                            <div class="number">${totalRepos}</div>
                            <div class="label">Total Repos</div>
                        </div>
                        <div class="stat-box">
                            <div class="number" style="color: #3fb950;">${activeRepos}</div>
                            <div class="label">Aktiv</div>
                        </div>
                        <div class="stat-box inactive">
                            <div class="number">${inactiveRepos}</div>
                            <div class="label">Nicht Aktiv</div>
                        </div>
                    `;
                    document.getElementById('statsModal').innerHTML = statsHtml;

                    renderReposList(orgInactiveRepos);
                    document.getElementById('reposModal').classList.add('active');
                });
        }

        function renderReposList(repos) {
            if (repos.length === 0) {
                document.getElementById('reposList').innerHTML = `
                    <div style="text-align: center; color: #3fb950; padding: 20px;">
                        ✅ Alle Repositories sind aktiv!
                    </div>
                `;
                return;
            }

            const html = repos
                .map(repo => `
                    <div class="repo-item">
                        <a href="${repo.url}" target="_blank" class="repo-name">
                            ${repo.repo}
                        </a>
                        <div class="repo-value">
                            ${repo.repoOwner || 'null'}
                        </div>
                    </div>
                `)
                .join('');
            
            document.getElementById('reposList').innerHTML = html;
        }

        function filterRepos() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filtered = filteredRepos.filter(r => 
                r.repo.toLowerCase().includes(searchText)
            );
            renderReposList(filtered);
        }

        function closeModal() {
            document.getElementById('reposModal').classList.remove('active');
        }

        // Schließe Modal wenn außen geklickt
        window.onclick = function(event) {
            const modal = document.getElementById('reposModal');
            if (event.target === modal) {
                modal.classList.remove('active');
            }
        }

        loadData();
    </script>
</body>
</html>
